<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色成分分析器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #ff6b9d; --secondary: #1a1a2e; --accent: #00d4aa; --gradient: linear-gradient(135deg, #ff6b9d 0%, #c44dff 100%); }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 680px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 2em; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .header p { color: #888; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; }
        .tab.active { background: var(--gradient); color: #fff; border-color: transparent; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-size: 1.2em; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .theme-btn { padding: 12px 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .theme-btn:hover, .theme-btn.active { background: var(--gradient); border-color: transparent; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; }
        input, textarea { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 16px; font-family: 'Noto Sans TC', sans-serif; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 20px rgba(255,107,157,0.2); }
        .btn { padding: 16px 32px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--gradient); color: #fff; width: 100%; font-size: 1.1em; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,157,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        #result { display: none; }
        .result-card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-top: 20px; animation: fadeIn 0.5s ease; }
        .user-name { text-align: center; font-size: 1.5em; font-weight: 700; margin-bottom: 12px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-summary { text-align: center; color: #d8caea; margin-bottom: 20px; line-height: 1.8; }
        .character-list { display: flex; flex-direction: column; gap: 12px; }
        .character-item { display: flex; align-items: center; gap: 12px; }
        .character-name { min-width: 100px; font-weight: 600; }
        .character-bar { flex: 1; height: 30px; background: rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; position: relative; }
        .character-fill { height: 100%; background: var(--gradient); border-radius: 15px; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; font-weight: 700; font-size: 14px; min-width: 50px; transition: width 0.5s ease; }
        .character-rank { width: 24px; height: 24px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .share-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .share-btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .share-btn.line { background: #00c300; color: #fff; } .share-btn.facebook { background: #1877f2; color: #fff; } .share-btn.twitter { background: #000; color: #fff; } .share-btn.copy,.share-btn.download { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none !important; }
        .character-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .character-input-row { display: flex; gap: 10px; }
        .character-input-row input { flex: 1; }
        .remove-btn { width: 40px; background: rgba(255,77,77,0.2); border: 1px solid rgba(255,77,77,0.3); color: #ff6b6b; border-radius: 8px; cursor: pointer; font-size: 18px; }
        .add-character-btn { background: rgba(0,212,170,0.2); border: 1px solid rgba(0,212,170,0.3); color: var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 500; }
        .url-share { margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .url-input-group { display: flex; gap: 10px; }
        .url-input-group input { flex: 1; font-size: 12px; padding: 10px; }
        .history-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .history-item:last-child { border-bottom: none; }
        .history-title { font-weight: 700; }
        .history-meta { font-size: 12px; color: #9e97ae; margin-top: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 角色成分分析器</h1>
            <p>輸入名字，分析你的專屬角色成分！</p>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('analyze')">🔍 分析模式</div>
            <div class="tab" onclick="switchTab('create')">➕ 建立分析器</div>
            <div class="tab" onclick="switchTab('history')">🕘 歷史紀錄</div>
        </div>
        <div id="analyzeMode">
            <div class="card">
                <div class="card-title">選擇動漫主題</div>
                <div class="theme-grid" id="themeGrid">
                    <div class="theme-btn active" data-theme="naruto" onclick="selectTheme('naruto')">火影忍者</div>
                    <div class="theme-btn" data-theme="onepiece" onclick="selectTheme('onepiece')">海賊王</div>
                    <div class="theme-btn" data-theme="deathnote" onclick="selectTheme('deathnote')">死亡筆記本</div>
                    <div class="theme-btn" data-theme="aot" onclick="selectTheme('aot')">進擊的巨人</div>
                    <div class="theme-btn" data-theme="demon" onclick="selectTheme('demon')">鬼滅之刃</div>
                    <div class="theme-btn" data-theme="pokemon" onclick="selectTheme('pokemon')">寶可夢</div>
                </div>
                <div class="form-group"><label>輸入你的名字</label><input type="text" id="userName" placeholder="例如：小明"></div>
                <button class="btn btn-primary" onclick="analyze()"><span>🔮</span> 開始分析</button>
            </div>
            <div id="result">
                <div class="card">
                    <div class="result-card" id="resultCard">
                        <div class="user-name" id="resultName"></div>
                        <div class="result-summary" id="resultSummary"></div>
                        <div class="character-list" id="characterList"></div>
                    </div>
                    <div class="share-buttons">
                        <a class="share-btn line" id="shareLine" target="_blank">LINE</a>
                        <a class="share-btn facebook" id="shareFacebook" target="_blank">Facebook</a>
                        <a class="share-btn twitter" id="shareTwitter" target="_blank">X (Twitter)</a>
                        <a class="share-btn copy" onclick="copyLink()">複製連結</a>
                        <a class="share-btn download" onclick="downloadResultCard()">下載結果圖</a>
                    </div>
                    <div class="url-share" id="shareUrl" style="display:none;"><label>分享連結：</label><div class="url-input-group"><input type="text" id="shareLinkInput" readonly></div></div>
                </div>
                <button class="btn btn-secondary" style="width:100%" onclick="resetAnalyze()"><span>🔄</span> 重新分析</button>
            </div>
        </div>
        <div id="createMode" class="hidden">
            <div class="card">
                <div class="card-title">建立你自己的成分分析器</div>
                <div class="form-group"><label>分析器名稱</label><input type="text" id="analyzerName" placeholder="例如：我喜歡的動漫角色"></div>
                <div class="form-group"><label>新增角色（2-6個）</label><div class="character-inputs" id="characterInputs"><div class="character-input-row"><input type="text" placeholder="角色 1" class="character-name-input"></div><div class="character-input-row"><input type="text" placeholder="角色 2" class="character-name-input"></div><div class="character-input-row"><input type="text" placeholder="角色 3" class="character-name-input"></div></div><div class="add-character-btn" onclick="addCharacterInput()">➕ 新增角色</div></div>
                <button class="btn btn-primary" onclick="createAnalyzer()"><span>✨</span> 建立分析器</button>
            </div>
            <div id="createdAnalyzer" class="hidden"><div class="card"><div class="card-title">✅ 分析器建立完成！</div><div class="url-share"><label>分享連結（讓朋友輸入名字測試）：</label><div class="url-input-group"><input type="text" id="createdLink" readonly><button class="btn btn-secondary" onclick="copyCreatedLink()">複製</button></div></div><button class="btn btn-primary" style="margin-top:15px" onclick="testAnalyzer()"><span>▶️</span> 測試自己的分析器</button></div></div>
        </div>
        <div id="historyMode" class="hidden"><div class="card"><div class="card-title">最近分析紀錄</div><div id="historyList"></div></div></div>
    </div>
    <script>
        const HISTORY_KEY = 'anime-character-analyzer-history-v1';
        const animeData = {
            naruto: ['漩渦鳴人', '旗木卡卡西', '奈良鹿丸', '我愛羅', '宇智波佐助', '春野櫻', '綱手', '自來也', '大蛇丸', '曉組織'],
            onepiece: ['魯夫', '索隆', '娜美', '香吉士', '喬巴', '羅賓', '布魯克', '佛朗基', '艾斯', '黑鬍子'],
            deathnote: ['夜神月', 'L', '彌海砂', '松山 Ryu', '硫克', '渡', '模木', '火口', '魅上照', 'Ni'],
            aot: ['艾連', '米卡莎', '阿爾敏', '里維', '韓吉', '艾爾文', '吉克', '萊納', '亞妮', '貝爾托特'],
            demon: ['炭治郎', '禰豆子', '善逸', '伊之助', '胡蝶忍', '煉獄杏壽郎', '富岡義勇', '鱗瀧左近次', '珠世', '鬼舞辻無慘'],
            pokemon: ['皮卡丘', '小火龍', '杰尼龜', '妙蛙種子', '小智', '小霞', '小剛', '火箭隊', '阿羅拉地區', '伽勒爾地區']
        };
        let currentTheme = 'naruto';
        let customCharacters = [];
        function getHistory(){ try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }
        function saveHistory(items){ localStorage.setItem(HISTORY_KEY, JSON.stringify(items)); }
        function selectTheme(theme) { currentTheme = theme; document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme)); }
        function switchTab(tab) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active'); document.getElementById('analyzeMode').classList.toggle('hidden', tab !== 'analyze'); document.getElementById('createMode').classList.toggle('hidden', tab !== 'create'); document.getElementById('historyMode').classList.toggle('hidden', tab !== 'history'); if(tab==='history') renderHistory(); }
        function buildSummary(results) { const top = results[0]; const second = results[1]; return `你最強烈的角色成分是「${top.name}」(${top.percentage}%)，同時也帶有 ${second.name} 的特質。整體看起來像是「主角能量 + 個人風格」兼具的混合型角色人格。`; }
        function analyze() {
            const name = document.getElementById('userName').value.trim(); if (!name) { alert('請輸入你的名字！'); return; }
            const characters = customCharacters.length > 0 ? customCharacters : animeData[currentTheme];
            const percentages = generateRandomPercentages(characters.length, name);
            const results = characters.map((char, i) => ({ name: char, percentage: percentages[i] })).sort((a, b) => b.percentage - a.percentage);
            document.getElementById('resultName').textContent = `${name} 的成分分析`;
            document.getElementById('resultSummary').textContent = buildSummary(results);
            document.getElementById('characterList').innerHTML = results.map((item, index) => `<div class="character-item"><div class="character-rank">${index + 1}</div><div class="character-name">${item.name}</div><div class="character-bar"><div class="character-fill" style="width: ${item.percentage}%">${item.percentage}%</div></div></div>`).join('');
            document.getElementById('result').style.display = 'block';
            generateShareUrl(name, characters);
            pushHistory({ name, theme: currentTheme, characters, results, createdAt: new Date().toISOString() });
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
        function pushHistory(entry) { const history = getHistory(); history.unshift(entry); saveHistory(history.slice(0, 12)); }
        function renderHistory() { const history = getHistory(); const el = document.getElementById('historyList'); if (!history.length) { el.innerHTML = '<div class="history-meta">尚無分析紀錄</div>'; return; } el.innerHTML = history.map(item => `<div class="history-item"><div class="history-title">${item.name} ｜ ${item.results[0]?.name || '—'} ${item.results[0]?.percentage || 0}%</div><div class="history-meta">${new Date(item.createdAt).toLocaleString('zh-TW')} ｜ 主題：${item.theme}</div></div>`).join(''); }
        function generateRandomPercentages(count, name) { let seed = 0; for (let i = 0; i < name.length; i++) { seed = ((seed << 5) - seed) + name.charCodeAt(i); seed = seed & seed; } const seededRandom = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }; let percentages = []; let remaining = 100; for (let i = 0; i < count - 1; i++) { const max = remaining - (count - i - 1); const value = Math.floor(seededRandom() * (max - 5)) + 5; percentages.push(Math.max(1, value)); remaining -= percentages[percentages.length - 1]; } percentages.push(Math.max(1, remaining)); for (let i = 0; i < 10; i++) { const j = Math.floor(seededRandom() * count); const k = Math.floor(seededRandom() * count); [percentages[j], percentages[k]] = [percentages[k], percentages[j]]; } return percentages; }
        function generateShareUrl(name, characters) { const baseUrl = window.location.href.split('?')[0]; const params = new URLSearchParams(); params.set('name', name); params.set('chars', characters.join(',')); const shareUrl = `${baseUrl}?${params.toString()}`; document.getElementById('shareLinkInput').value = shareUrl; document.getElementById('shareUrl').style.display = 'block'; const text = `我是 ${name}！快來看我的角色成分分析結果`; document.getElementById('shareLine').href = `https://line.me/R/msg/text/?${encodeURIComponent(text + '\n' + shareUrl)}`; document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`; document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(shareUrl)}`; }
        function copyLink() { const input = document.getElementById('shareLinkInput'); input.select(); document.execCommand('copy'); alert('連結已複製！'); }
        function downloadResultCard() { const card = document.getElementById('resultCard'); const text = [document.getElementById('resultName').textContent, document.getElementById('resultSummary').textContent, ...Array.from(document.querySelectorAll('.character-item')).map(el => el.innerText)].join('\n'); const blob = new Blob([text], { type: 'text/plain' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'anime-character-result.txt'; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
        function resetAnalyze() { document.getElementById('userName').value = ''; document.getElementById('result').style.display = 'none'; customCharacters = []; }
        function addCharacterInput() { const container = document.getElementById('characterInputs'); const rows = container.querySelectorAll('.character-input-row'); if (rows.length >= 6) { alert('最多只能新增 6 個角色！'); return; } const row = document.createElement('div'); row.className = 'character-input-row'; row.innerHTML = `<input type="text" placeholder="角色 ${rows.length + 1}" class="character-name-input"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`; container.appendChild(row); }
        function createAnalyzer() { const name = document.getElementById('analyzerName').value.trim(); const characterInputs = document.querySelectorAll('.character-name-input'); const characters = []; characterInputs.forEach(input => { if (input.value.trim()) characters.push(input.value.trim()); }); if (characters.length < 2) { alert('請至少輸入 2 個角色！'); return; } const baseUrl = window.location.href.split('?')[0]; const params = new URLSearchParams(); if (name) params.set('title', name); params.set('chars', characters.join(',')); const shareUrl = `${baseUrl}?${params.toString()}`; document.getElementById('createdLink').value = shareUrl; document.getElementById('createdAnalyzer').classList.remove('hidden'); }
        function copyCreatedLink() { const input = document.getElementById('createdLink'); input.select(); document.execCommand('copy'); alert('連結已複製！'); }
        function testAnalyzer() { switchTab('analyze'); document.getElementById('userName').focus(); }
        window.onload = function() { const params = new URLSearchParams(window.location.search); const chars = params.get('chars'); const title = params.get('title'); const name = params.get('name'); renderHistory(); if (chars) { customCharacters = chars.split(','); if (title) document.querySelector('.header p').textContent = `🎭 ${title}`; if (name) { document.getElementById('userName').value = name; analyze(); } else { switchTab('analyze'); document.getElementById('analyzeMode').querySelector('.card-title').textContent = '輸入你的名字開始分析'; } } };
    </script>
</body>
</html>
